<html>
<head>
<meta charset="UTF-8">
<!-- Add icon library -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style type="text/css">
    #layer1 {
        width: 1500px;
        padding: 10px; /* Поля вокруг текста */
        background: #F0F8FF; /* Цвет фона */
    }
    table {
        width: 100%;
        border: 1px solid rgba(102, 153, 204, 1.0);
    }

    td:nth-child(1n) {  /* значок папки */
        width: 30%;
    }
    td:nth-child(2n) {	/* имя папки */
        width: 60%;
    }
    td:nth-child(3n) {  /* значок play */
        width: 10%;
    }
    caption {color: #039;}
    th {
        font-weight: normal;
        color: #039;
        border-bottom: 1px dashed #69c;
        padding: 12px 17px;
    }
    td {
        border-bottom: 1px solid #ccc;
        color: #669;
        text-align: left;
        padding: 7px 17px;
        transition: .3s linear;
    }
    tr:hover td {background: #ccddff;}

    /* unvisited link */
    a:link {
        text-decoration: none;
        color: navy
    }

    /* visited link */
    a:visited {
        color: gray;
    }

    /* mouse over link */
    a:hover {
        text-decoration: underline;
        color: blue;
    }

    a:active {
        color: red;
    }

</style>
</head>
<body>
